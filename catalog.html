<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Каталог — Листай</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page-catalog">
  <header class="site-header site-header--solid">
    <a class="logo" href="index.html">Листай</a>
    <nav class="nav" aria-label="Основная навигация">
      <a href="catalog.html" aria-current="page">Каталог</a>
      <a href="index.html#about">О магазине</a>
      <a href="index.html#contacts">Контакты</a>
    </nav>
  </header>

  <main class="catalog-page">
    <div class="catalog-toolbar">
      <h1 class="catalog-title">Каталог книг</h1>

      <div class="catalog-controls">
        <label class="search-field">
          <span class="visually-hidden">Поиск по названию или автору</span>
          <input
            type="search"
            id="search-input"
            name="search"
            placeholder="Поиск по названию или автору…"
            autocomplete="off"
          >
        </label>

        <button type="button" class="btn btn--filter" id="filters-toggle" aria-expanded="false" aria-controls="filters-panel">
          Фильтры
        </button>
      </div>

      <form class="filters-panel" id="filters-panel" hidden>
        <fieldset class="filter-group">
          <legend>Жанр</legend>
          <label>
            <select id="filter-genre" name="genre">
              <option value="">Все жанры</option>
            </select>
          </label>
        </fieldset>

        <fieldset class="filter-group">
          <legend>Состояние</legend>
          <label class="check">
            <input type="checkbox" name="condition" value="новая">
            <span>Новая</span>
          </label>
          <label class="check">
            <input type="checkbox" name="condition" value="как новая">
            <span>Как новая</span>
          </label>
          <label class="check">
            <input type="checkbox" name="condition" value="с дефектами">
            <span>С дефектами</span>
          </label>
        </fieldset>

        <fieldset class="filter-group filter-group--price">
          <legend>Цена, ₽</legend>
          <div class="price-range">
            <label>
              <span class="visually-hidden">Минимальная цена</span>
              <input type="number" id="price-min" name="price-min" min="0" step="1" placeholder="От">
            </label>
            <span class="price-range__sep" aria-hidden="true">—</span>
            <label>
              <span class="visually-hidden">Максимальная цена</span>
              <input type="number" id="price-max" name="price-max" min="0" step="1" placeholder="До">
            </label>
          </div>
        </fieldset>

        <div class="filters-actions">
          <button type="button" class="btn btn--primary" id="filters-apply">Применить</button>
          <button type="reset" class="btn btn--outline" id="filters-reset">Сбросить</button>
        </div>
      </form>

      <p class="catalog-meta" id="catalog-meta" aria-live="polite"></p>
    </div>

    <div class="books-grid" id="books-grid"></div>
    <p class="catalog-empty" id="catalog-empty" hidden>Ничего не найдено. Измените запрос или фильтры.</p>
  </main>

  <footer class="site-footer">
    <p>© 2026 Листай</p>
  </footer>

  <script src="books.js"></script>
  <script src="auth.js"></script>
  <script src="catalog.js"></script>
</body>
</html>
