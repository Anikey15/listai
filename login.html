<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход администратора — Листай</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page-auth">
  <header class="site-header site-header--solid">
    <a class="logo" href="index.html">Листай</a>
    <nav class="nav" aria-label="Основная навигация">
      <a href="catalog.html">Каталог</a>
      <a href="index.html#about">О магазине</a>
      <a href="index.html#contacts">Контакты</a>
    </nav>
  </header>

  <main class="auth-page">
    <section class="auth-card">
      <p class="auth-card__eyebrow">Панель управления</p>
      <h1>Вход для администратора</h1>
      <p class="auth-card__hint">Вход доступен только через сервер сайта. Пароль хранится на сервере в виде хеша и не отдаётся в код страницы.</p>

      <form id="login-form" class="auth-form" novalidate>
        <label>
          <span>Логин</span>
          <input type="text" id="login-input" name="login" autocomplete="username" required>
        </label>
        <label>
          <span>Пароль</span>
          <input type="password" id="password-input" name="password" autocomplete="current-password" required>
        </label>
        <p class="auth-error" id="login-error" hidden></p>
        <button type="submit" class="btn btn--primary">Войти</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 2026 Листай</p>
  </footer>

  <script src="auth.js"></script>
  <script src="login.js"></script>
</body>
</html>
